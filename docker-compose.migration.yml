# Ephemeral stack used once to convert dump.sql (MySQL) → pgdump.sql (postgres + pgvector).
#
# Why a separate compose file: the main docker-compose.yml is post-migration —
# its `db` service is already pgvector. This sidecar boots a transient mysql
# loaded from dump.sql and a transient postgres, runs pgloader between them,
# then pg_dumps the result. After teardown the prod `db` service can be brought
# up clean and `pgdump.sql` restored into it via `psql`.
#
# Why mysql:8.0 (and not 9.x, matching prod): pgloader's MySQL auth client
# only speaks the legacy `mysql_native_password` plugin, which MySQL 9.x
# removed entirely. The dump itself is plain `CREATE TABLE`/`INSERT` and
# restores cleanly across the version gap — schema-portable.

services:
  mysql:
    image: mysql:8.0
    command: --default-authentication-plugin=mysql_native_password
    environment:
      MYSQL_ROOT_PASSWORD: passw0rd
      MYSQL_DATABASE: indexer_utils
    volumes:
      # Auto-loaded by the mysql entrypoint on first start. Healthcheck only
      # goes green once every initdb.d script has completed, so callers can
      # safely wait on `docker compose up -d --wait`.
      - ./dump.sql:/docker-entrypoint-initdb.d/01-dump.sql:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-uroot", "-ppassw0rd", "--silent"]
      interval: 5s
      timeout: 5s
      retries: 30
      start_period: 60s

  pg:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: indexer_utils
      POSTGRES_USER: indexer_utils
      POSTGRES_PASSWORD: passw0rd
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U indexer_utils -d indexer_utils"]
      interval: 3s
      timeout: 3s
      retries: 20
