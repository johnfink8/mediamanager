version: "2.1"
services:
  sonarr:
    image: linuxserver/sonarr
    container_name: sonarr
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=America/New_York
      - UMASK_SET=022 #optional
    volumes:
      - /opt/sonarr_data:/config
      - /store:/store
      - /mnt:/mnt
    restart: unless-stopped
  radarr:
    image: linuxserver/radarr
    container_name: radarr
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=America/New_York
      - UMASK_SET=022 #optional
    volumes:
      - /opt/radarr_data:/config
      - /store:/store
      - /mnt:/mnt
    restart: unless-stopped
  servermonitor:
    build:
      context: .
      target: runner
    restart: unless-stopped
    depends_on:
      - redis
      - db
      - weaviate
  builder:
    build:
      context: .
      target: build
    volumes:
      - .:/opt/servermonitor
  devserver:
    build:
      context: .
      target: runner
    restart: unless-stopped
    depends_on:
      - redis
      - db
      - weaviate
    volumes:
      - .:/opt/servermonitor
    ports:
      - 8001:8000
    command:
      - ./dev_server.sh
    environment:
      - DEBUG=1
  nginx:
    build:
      context: .
      target: host
    restart: unless-stopped
    ports:
      - 80:80
      - 443:443
    volumes:
      - /var/www/:/var/www/
    depends_on:
      - sab
      - sonarr
      - radarr
      - servermonitor
  sab:
    image: linuxserver/sabnzbd:latest
    volumes:
      - /store:/store
      - /mnt/syno4/downloads:/mnt/syno4/downloads
      - /opt/sabnzbd:/config
    environment:
      - PUID=1000
    restart: unless-stopped
  redis:
    image: redis:alpine
    restart: unless-stopped
  db:
    image: mysql:9.4.0
    volumes:
      - mysql_data:/var/lib/mysql
      - ./my.cnf:/etc/my.cnf
    environment:
      - MYSQL_ROOT_PASSWORD=passw0rd
      - MYSQL_DATABASE=indexer_utils
      - MYSQL_USER=indexer_utils
      - MYSQL_PASSWORD=passw0rd
    ports:
      - 3306:3306
    restart: unless-stopped
  weaviate:
    command:
    - --host
    - 0.0.0.0
    - --port
    - '8080'
    - --scheme
    - http
    image: cr.weaviate.io/semitechnologies/weaviate:1.32.2
    ports:
    - 8080:8080
    - 50051:50051
    volumes:
    - weaviate_data:/var/lib/weaviate
    restart: on-failure:0
    environment:
      QUERY_DEFAULTS_LIMIT: 25
      AUTHENTICATION_ANONYMOUS_ACCESS_ENABLED: 'true'
      PERSISTENCE_DATA_PATH: '/var/lib/weaviate'
      ENABLE_API_BASED_MODULES: 'true'
      CLUSTER_HOSTNAME: 'node1'
volumes:
  weaviate_data:
  mysql_data:
