secrets:
  JWT_SECRET:
    file: ./secrets/JWT_SECRET
  SESSION_SECRET:
    file: ./secrets/SESSION_SECRET
  STORAGE_ENCRYPTION_KEY:
    file: ./secrets/STORAGE_ENCRYPTION_KEY
services:
  authelia:
    image: authelia/authelia:latest
    container_name: authelia
    secrets: ["JWT_SECRET", "SESSION_SECRET", "STORAGE_ENCRYPTION_KEY"]
    environment:
      AUTHELIA_IDENTITY_VALIDATION_RESET_PASSWORD_JWT_SECRET_FILE: "/run/secrets/JWT_SECRET"
      X_AUTHELIA_CONFIG_FILTERS: 'template'
      AUTHELIA_SESSION_SECRET_FILE: "/run/secrets/SESSION_SECRET"
      AUTHELIA_STORAGE_ENCRYPTION_KEY_FILE: "/run/secrets/STORAGE_ENCRYPTION_KEY"
    volumes:
      - ./authelia_config:/config
    expose: ["9091"]
    networks: [proxy]
    depends_on: [redis]
    restart: unless-stopped
  sonarr:
    image: linuxserver/sonarr
    container_name: sonarr
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=America/New_York
      - UMASK_SET=022 #optional
    volumes:
      - /opt/sonarr_data:/config
      - /store:/store
      - /mnt:/mnt
    restart: unless-stopped
    networks: [proxy]
  radarr:
    image: linuxserver/radarr
    container_name: radarr
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=America/New_York
      - UMASK_SET=022 #optional
    volumes:
      - /opt/radarr_data:/config
      - /store:/store
      - /mnt:/mnt
    restart: unless-stopped
    networks: [proxy]
    ports:
      - 7878:7878
  vdiag:
    # ffmpeg sidecar for the video diagnostic/repair tools. Holds the media
    # mount the app containers lack. Internal only — no published ports, not
    # proxied by nginx; the VDIAG_TOKEN here must match the app's .env value.
    build:
      context: ./vdiag
    user: "1000:1000"
    environment:
      - VDIAG_TOKEN=${VDIAG_TOKEN}
      - VDIAG_ALLOWED_ROOTS=/store,/mnt
      # vdiag resolves the ratingKey → path via Plex itself (never trusts a
      # path off the wire), so it needs Plex creds.
      - PLEX_URL=${PLEX_URL}
      - PLEX_TOKEN=${PLEX_TOKEN}
      # scan/remux run as background jobs whose progress lands in the shared
      # redis (the app polls it).
      - REDIS_HOST=redis
    volumes:
      - /store:/store
      - /mnt:/mnt
    restart: unless-stopped
    depends_on:
      - redis
    networks: [proxy]
  servermonitor:
    build:
      context: .
      target: runner
    restart: unless-stopped
    depends_on:
      - redis
      - db
      - vdiag
    networks: [proxy]
  builder:
    build:
      context: .
      target: build
    volumes:
      - .:/opt/servermonitor
  devserver:
    build:
      context: .
      target: runner
    restart: unless-stopped
    depends_on:
      - redis
      - db
      - vdiag
    volumes:
      - .:/opt/servermonitor
    ports:
      - 8001:8000
    command:
      - ./dev_server.sh
    environment:
      - DEBUG=1
    networks: [proxy]
  nginx:
    build:
      context: .
      target: host
    restart: unless-stopped
    ports:
      - 80:80
      - 443:443
    volumes:
      - /var/www/:/var/www/
    depends_on:
      - authelia
      - sonarr
      - radarr
      - servermonitor
    networks: [proxy]
  redis:
    image: redis:alpine
    restart: unless-stopped
    ports:
      - 6379:6379
    networks: [proxy]
  db:
    image: pgvector/pgvector:pg16
    volumes:
      - pg_data:/var/lib/postgresql/data
      - ./scripts/postgres-init:/docker-entrypoint-initdb.d:ro
    environment:
      - POSTGRES_DB=indexer_utils
      - POSTGRES_USER=indexer_utils
      - POSTGRES_PASSWORD=passw0rd
    ports:
      - 5432:5432
    restart: unless-stopped
    networks: [proxy]
volumes:
  pg_data:

networks:
  proxy:
    driver: bridge
