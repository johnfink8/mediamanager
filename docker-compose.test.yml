services:
  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: indexer_utils
      POSTGRES_USER: indexer_utils
      POSTGRES_PASSWORD: passw0rd
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U indexer_utils -d indexer_utils"]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 30s

  redis:
    image: redis:alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 3s
      timeout: 3s
      retries: 10

  db_init:
    build:
      context: .
      target: runner
    env_file: .env.test
    volumes:
      - ./e2e/init_db.py:/opt/servermonitor/init_db.py
    command: ["python", "init_db.py"]
    depends_on:
      db:
        condition: service_healthy

  app:
    build:
      context: .
      target: runner
    env_file: .env.test
    command: ["./gunicorn_start"]
    depends_on:
      db_init:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/"]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 20s

  web:
    build:
      context: .
      target: testhost
    depends_on:
      app:
        condition: service_healthy

  seeder:
    build:
      context: .
      target: runner
    env_file: .env.test
    volumes:
      - ./e2e/seed.py:/opt/servermonitor/seed.py
    command: ["python", "seed.py"]
    depends_on:
      app:
        condition: service_healthy

  playwright:
    build:
      context: .
      dockerfile: Dockerfile.playwright
    depends_on:
      seeder:
        condition: service_completed_successfully
      web:
        condition: service_started
    environment:
      BASE_URL: http://web

  # Unit tests (tests/) — use in-memory SQLite, no infrastructure deps.
  # Run with: docker-compose -f docker-compose.test.yml run --rm pytest
  pytest:
    build:
      context: .
      target: runner
    volumes:
      - ./tests:/opt/servermonitor/tests
    command:
      - sh
      - -c
      - "pip install --quiet pytest && pytest tests/ -q"
