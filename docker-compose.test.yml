# Project name forked so the test stack's containers/networks/volumes
# never collide with the prod stack (docker-compose.yml). Without this
# both files map to ``mediamanager-db-1`` and bringing up either one
# evicts the other's container (the named volume survives, but the
# user has to re-up the prod stack to remount it).
name: mediamanager-test

services:
  db:
    image: pgvector/pgvector:pg16
    volumes:
      - ./scripts/postgres-init:/docker-entrypoint-initdb.d:ro
    environment:
      POSTGRES_DB: indexer_utils
      POSTGRES_USER: indexer_utils
      POSTGRES_PASSWORD: passw0rd
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U indexer_utils -d indexer_utils"]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 30s

  redis:
    image: redis:alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 3s
      timeout: 3s
      retries: 10

  db_init:
    build:
      context: .
      target: runner
    env_file: .env.test
    volumes:
      - ./e2e/init_db.py:/opt/servermonitor/init_db.py
    command: ["python", "init_db.py"]
    depends_on:
      db:
        condition: service_healthy

  app:
    build:
      context: .
      target: runner
    env_file: .env.test
    command: ["./gunicorn_start"]
    depends_on:
      db_init:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/"]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 20s

  web:
    build:
      context: .
      target: testhost
    depends_on:
      app:
        condition: service_healthy

  seeder:
    build:
      context: .
      target: runner
    env_file: .env.test
    volumes:
      - ./e2e/seed.py:/opt/servermonitor/seed.py
    command: ["python", "seed.py"]
    depends_on:
      app:
        condition: service_healthy

  playwright:
    build:
      context: .
      dockerfile: Dockerfile.playwright
    depends_on:
      seeder:
        condition: service_completed_successfully
      web:
        condition: service_started
    environment:
      BASE_URL: http://web

  # Unit tests (tests/) — run against the real pgvector postgres so the
  # pgvector / JSONB / cosine-distance code paths exercise their actual SQL.
  # pytest swaps to TEST_DB_NAME via session.py's sys.argv check, so the
  # real DB is never touched even though we point at the same postgres.
  # Run with: docker-compose -f docker-compose.test.yml run --build --rm pytest
  pytest:
    build:
      context: .
      target: runner
    volumes:
      - ./tests:/opt/servermonitor/tests
      # vdiag ships as its own image, not in the app build; mount it so the
      # sidecar path-safety unit test can load server.py.
      - ./vdiag:/opt/servermonitor/vdiag:ro
    depends_on:
      db:
        condition: service_healthy
    command:
      - sh
      - -c
      - "pip install --quiet pytest pytest-asyncio && pytest --asyncio-mode=auto tests/ -q"
