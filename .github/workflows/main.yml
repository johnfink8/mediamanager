on:
  push:
    branches:
      - "**"
jobs:
  build:
    if: github.ref != 'refs/heads/main'
    runs-on: self-hosted
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Copy server configuration into workspace
        run: |
          SRC=/opt/servermonitor

          cp "$SRC/.env" .
          cp "$SRC/nginx.conf" .
          cp "$SRC/ssh.conf" .
          cp "$SRC/auth.conf" .
          cp "$SRC/auth.users" .
          cp -r "$SRC/ssl" ./ssl

      - name: Build Docker image
        run: |
          python3.12 -m venv .venv
          source .venv/bin/activate
          pip install -r requirements.txt
          pip install ruff
          ruff format --check
          ruff check --no-fix
          docker build -t builder:${{ github.sha }} --target build .
          docker run --rm builder:${{ github.sha }} npm run lint
          docker build -t mediamanager:${{ github.sha }} .

  deploy:
    if: github.ref == 'refs/heads/main'
    runs-on: self-hosted
    steps:
      - name: Run deployment script
        run: |
          cd /opt/servermonitor
          git pull
          docker compose up -d --build nginx
