name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  lint-python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install ruff
      - run: ruff format --check
      - run: ruff check --no-fix

  lint-frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Prepare env
        run: cp .env.sample .env
      - name: Build frontend image
        run: docker build -t builder:${{ github.sha }} --target build .
      - name: Lint JS/TS
        run: docker run --rm builder:${{ github.sha }} npm run lint

  unit-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Prepare env
        run: cp .env.sample .env
      - name: Run pytest
        run: docker compose -f docker-compose.test.yml run --build --rm pytest
      - name: Cleanup
        if: always()
        run: docker compose -f docker-compose.test.yml down -v

  e2e-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Prepare env
        run: cp .env.sample .env && cp .env.sample .env.test
      - name: Run Playwright suite
        run: docker compose -f docker-compose.test.yml run --build --rm playwright
      - name: Cleanup
        if: always()
        run: docker compose -f docker-compose.test.yml down -v
