on:
  push:
    branches:
      - '**'
jobs:
  build:
    if: github.ref != 'refs/heads/main'
    runs-on: self-hosted
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Copy server configuration into workspace
        run: |
          SRC=/opt/servermonitor

          cp "$SRC/.env" .
          cp "$SRC/nginx.conf" .
          cp "$SRC/ssh.conf" .
          cp "$SRC/auth.conf" .
          cp "$SRC/auth.users" .
          cp -r "$SRC/ssl" ./ssl

      - name: Build Docker image
        run: |
          docker build -t mediamanager:${{ github.sha }} .
          npm run relay && npm run lint

  deploy:
    if: github.ref == 'refs/heads/main'
    runs-on: self-hosted  # Or your specific label, e.g., 'self-hosted-deploy'
    steps:
      - name: Run deployment script
        run: |
          # Your deployment commands here
          echo "Deploying application..."
          # Example: docker-compose up -d
          cd /opt/servermonitor
          git pull
          docker compose up -d --build nginx
