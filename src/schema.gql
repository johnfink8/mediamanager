schema {
  query: SchemaQuery
  mutation: Mutation
  subscription: Subscription
}

input AcceptAllRecommendedInput {
  ids: [ID!]!
  itemType: String!
}

type AcceptAllRecommendedResult {
  addedCount: Int!
  ignoredCount: Int!
  items: IgnoreItemList!
}

input AddItemInput {
  id: ID!
}

type AttributeEntry {
  key: String!
  values: [String!]!
  details: JSON
}

type CheckRunHistory {
  movies: [CheckRunType!]!
  shows: [CheckRunType!]!
}

type CheckRunType {
  kind: String!
  timestamp: String!
  durationMs: Int!
  success: Boolean!
  message: String!
  checkedCount: Int!
  error: String
  checkedItems: [CheckedItemType!]!
}

type CheckedItemType {
  title: String!
  uid: String!
  ignored: Boolean
  note: String
}

input DeferItemInput {
  id: ID!
}

type HistoricalIgnoreItemList {
  nodes: [IgnoreItem!]!
  pageInfo: PageInfo!
}

type IgnoreItem {
  type: String!
  uid: String!
  ignore: Boolean!
  added: Boolean!
  title: String!
  checkedTitle: String
  posterUrl: String
  attributes: [AttributeEntry!]!
  createdAt: Int
  id: ID!
}

type IgnoreItemList {
  id: ID!
  nodes: [IgnoreItem!]!
}

"""
The `JSON` scalar type represents JSON values as specified by [ECMA-404](https://ecma-international.org/wp-content/uploads/ECMA-404_2nd_edition_december_2017.pdf).
"""
scalar JSON @specifiedBy(url: "https://ecma-international.org/wp-content/uploads/ECMA-404_2nd_edition_december_2017.pdf")

type MovieRecommendationType {
  id: ID
  imdbId: String!
  title: String!
  overview: String
  posterUrl: String
  year: Int
  genres: [String!]!
  cast: [String!]!
  reason: String
  source: String!
  prompt: String
  excludedRecent: [String!]!
  preference: RecommendationPreference
}

type Mutation {
  addItem(data: AddItemInput!): IgnoreItem!
  acceptAllRecommended(data: AcceptAllRecommendedInput!): AcceptAllRecommendedResult!
  deleteItem(data: AddItemInput!): IgnoreItem!
  setItemAdded(data: SetItemAddedInput!): IgnoreItem!
  retryAi(data: RetryAiInput!): IgnoreItem!
  recheckVisible(itemType: String!): [IgnoreItem!]!
  deferItem(data: DeferItemInput!): IgnoreItem!
  setRecommendationPreference(data: SetRecommendationPreferenceInput!): RecommendationFeedbackType!
  triggerScheduledJob(id: ID!): ScheduledJobType!
  pauseScheduledJob(id: ID!): ScheduledJobType!
  resumeScheduledJob(id: ID!): ScheduledJobType!
  updateScheduledJobTrigger(data: UpdateScheduledJobTriggerInput!): ScheduledJobType!
}

type PageInfo {
  hasNextPage: Boolean!
  hasPreviousPage: Boolean!
  startOffset: Int!
  endOffset: Int!
  totalCount: Int!
}

type RecommendationFeedbackType {
  id: ID!
  preference: RecommendationPreference!
}

enum RecommendationPreference {
  LIKE
  NOT_NOW
  NEVER
}

input RetryAiInput {
  id: ID!
}

input ScheduledJobCronInput {
  year: String = null
  month: String = null
  day: String = null
  week: String = null
  dayOfWeek: String = null
  hour: String = null
  minute: String = null
  second: String = null
}

input ScheduledJobIntervalInput {
  weeks: Int = null
  days: Int = null
  hours: Int = null
  minutes: Int = null
  seconds: Int = null
}

type ScheduledJobTriggerType {
  kind: String!
  expression: String!
  fields: JSON!
}

type ScheduledJobType {
  id: ID!
  name: String!
  description: String!
  nextRunTime: String
  paused: Boolean!
  trigger: ScheduledJobTriggerType!
}

type SchemaQuery {
  items(itemType: String = null): IgnoreItemList!
  checkRuns: CheckRunHistory!
  historicalItems(itemType: String = null, limit: Int! = 20, offset: Int! = 0, search: String = null): HistoricalIgnoreItemList!
  scheduledJobs: [ScheduledJobType!]!
  movieRecommendation(prompt: String = null): MovieRecommendationType
}

input SetItemAddedInput {
  id: ID!
  added: Boolean!
}

input SetRecommendationPreferenceInput {
  recommendationId: ID!
  preference: RecommendationPreference!
}

type Subscription {
  items(itemType: String = null): IgnoreItemList!
}

input UpdateScheduledJobTriggerInput {
  id: ID!
  kind: String!
  cron: ScheduledJobCronInput = null
  interval: ScheduledJobIntervalInput = null
}
