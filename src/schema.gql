schema {
  query: SchemaQuery
  mutation: Mutation
  subscription: Subscription
}

input AddItemInput {
  id: ID!
}

type AttributeEntry {
  key: String!
  values: [String!]!
  details: JSON
}

input Filter {
  type: String = null
  attribute: String = null
  operator: String = null
  value: String = null
}

type CheckedItemType {
  title: String!
  uid: String!
  ignored: Boolean
  note: String
}

type CheckRunType {
  kind: String!
  timestamp: String!
  durationMs: Int!
  success: Boolean!
  message: String!
  checkedCount: Int!
  error: String
  checkedItems: [CheckedItemType!]!
}

type CheckRunHistory {
  movies: [CheckRunType!]!
  shows: [CheckRunType!]!
}

type FilterRule {
  itemType: String!
  attribute: String!
  operator: String!
  value: String!
  enabled: Boolean!
  id: ID!
}

input FilterRuleInput {
  itemType: String!
  attribute: String!
  operator: String!
  value: String!
  enabled: Boolean! = true
}

type FilterRuleList {
  id: ID!
  nodes: [FilterRule!]!
}

type HistoricalIgnoreItemList {
  nodes: [IgnoreItem!]!
  pageInfo: PageInfo!
}

type IgnoreItem {
  type: String!
  uid: String!
  ignore: Boolean!
  added: Boolean!
  title: String!
  checkedTitle: String
  posterUrl: String
  attributes: [AttributeEntry!]!
  id: ID!
}

type IgnoreItemList {
  id: ID!
  nodes: [IgnoreItem!]!
}

"""
The `JSON` scalar type represents JSON values as specified by [ECMA-404](https://ecma-international.org/wp-content/uploads/ECMA-404_2nd_edition_december_2017.pdf).
"""
scalar JSON @specifiedBy(url: "https://ecma-international.org/wp-content/uploads/ECMA-404_2nd_edition_december_2017.pdf")


enum RecommendationPreference {
  LIKE
  NOT_NOW
  NEVER
}

type Mutation {
  addItem(data: AddItemInput!): IgnoreItem!
  deleteItem(data: AddItemInput!): IgnoreItem!
  createFilterRule(data: FilterRuleInput!): MutationReturn!
  deleteFilterRule(id: ID!): MutationReturn!
  setItemAdded(data: SetItemAddedInput!): IgnoreItem!
  setRecommendationPreference(data: SetRecommendationPreferenceInput!): RecommendationFeedback!
  retryAi(data: RetryAiInput!): IgnoreItem!
  recheckVisible(itemType: String!): [IgnoreItem!]!
  deferItem(data: DeferItemInput!): IgnoreItem!
}

type MutationReturn {
  ignoreItems: IgnoreItemList!
  filterRules: FilterRuleList!
}

input SetItemAddedInput {
  id: ID!
  added: Boolean!
}

input RetryAiInput {
  id: ID!
}

input DeferItemInput {
  id: ID!
}

input SetRecommendationPreferenceInput {
  recommendationId: ID!
  preference: RecommendationPreference!
}

type RecommendationFeedback {
  id: ID!
  preference: RecommendationPreference!
}

type PageInfo {
  hasNextPage: Boolean!
  hasPreviousPage: Boolean!
  startOffset: Int!
  endOffset: Int!
  totalCount: Int!
}

type SchemaQuery {
  items(filters: [Filter!] = null): IgnoreItemList!
  filterRules: FilterRuleList!
  checkRuns: CheckRunHistory!
  historicalItems(filters: [Filter!] = null, limit: Int! = 20, offset: Int! = 0, applyInvertedPermanentRules: Boolean! = false): HistoricalIgnoreItemList!
  movieRecommendation(prompt: String = null): MovieRecommendation
}

type Subscription {
  items(filters: [Filter!]): IgnoreItemList!
}

type MovieRecommendation {
  id: ID
  imdbId: String!
  title: String!
  overview: String
  posterUrl: String
  year: Int
  genres: [String!]!
  cast: [String!]!
  reason: String
  source: String!
  prompt: String
  excludedRecent: [String!]!
  preference: RecommendationPreference
}
