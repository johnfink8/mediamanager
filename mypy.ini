[mypy]
python_version = 3.9
ignore_missing_imports = True
strict = True

# fastmcp/mcp ship 3.10+ syntax (match statements); don't follow into them
# under our 3.9 target — they're treated as untyped at the boundary.
[mypy-fastmcp.*]
follow_imports = skip

[mypy-mcp.*]
follow_imports = skip

[mypy-agents.*]
follow_imports = skip

# @mcp.tool reads as untyped only because fastmcp is skipped above; the tool
# functions themselves are fully annotated.
[mypy-indexer_utils.mcp_server]
disallow_untyped_decorators = False
